plugins {
    id 'java-library'
    id 'checkstyle'
    id 'com.vanniktech.maven.publish'
}

java {
    // Panama FFM API was finalized in Java 22, compatible with 22+
    sourceCompatibility = JavaVersion.VERSION_22
    targetCompatibility = JavaVersion.VERSION_22
}

javadoc {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    options.author = true
    options.version = true
    options.links = [
        'https://docs.oracle.com/en/java/javase/22/docs/api/'
    ]
}

repositories {
    mavenCentral()
}

dependencies {
    api project(':ycrdt-core')
    testImplementation 'junit:junit:4.13.2'
    // Include abstract test classes from ycrdt-core
    testImplementation project(':ycrdt-core').sourceSets.test.output
    // For CrossImplementationSyncTest - needs JNI implementation
    testImplementation project(':ycrdt-jni')
}

test {
    testLogging {
        events 'passed', 'skipped', 'failed'
        exceptionFormat = 'full'
        showStandardStreams = false
    }
    // Enable native access for Panama FFM API
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}

// Task to build the yffi library from upstream
task buildYffi(type: Exec) {
    group = 'build'
    description = 'Builds the yffi native library from upstream y-crdt'

    workingDir rootProject.projectDir

    // Determine expected library name based on OS
    def libName
    if (org.gradle.internal.os.OperatingSystem.current().isLinux()) {
        libName = 'libyrs.so'
    } else if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        libName = 'libyrs.dylib'
    } else if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        libName = 'yrs.dll'
    } else {
        libName = 'libyrs.so'
    }

    def nativeLibFile = file("${rootProject.buildDir}/native/${libName}")

    // Declare outputs so Gradle can skip if up-to-date
    outputs.file(nativeLibFile)

    // release.yml stages prebuilt libs under src/main/resources/native/<os>/<arch>/
    // from the cross-platform build-native.yml matrix. Detect either staging
    // location to skip a redundant rebuild (cargo redownload + compile).
    def rawArch = System.getProperty("os.arch").toLowerCase()
    def osArch
    if (rawArch.contains("amd64") || rawArch.contains("x86_64")) {
        osArch = 'x86_64'
    } else if (rawArch.contains("aarch64") || rawArch.contains("arm64")) {
        osArch = 'aarch64'
    } else {
        osArch = rawArch
    }
    def osName
    if (org.gradle.internal.os.OperatingSystem.current().isLinux()) {
        osName = 'linux'
    } else if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        osName = 'macos'
    } else if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        osName = 'windows'
    } else {
        osName = 'linux'
    }
    def stagedLibFile = file("${project.projectDir}/src/main/resources/native/${osName}/${osArch}/${libName}")

    // Skip if a lib is present at either the legacy build-dir location
    // (build-yffi.sh's output) or the release.yml staging path.
    onlyIf {
        !nativeLibFile.exists() && !stagedLibFile.exists()
    }

    // On Windows, use Git Bash explicitly instead of WSL bash
    if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        // Try common Git Bash locations
        def gitBashPaths = [
            'C:\\Program Files\\Git\\bin\\bash.exe',
            'C:\\Program Files (x86)\\Git\\bin\\bash.exe',
            System.getenv('PROGRAMFILES') + '\\Git\\bin\\bash.exe',
        ]
        def gitBash = gitBashPaths.find { new File(it).exists() } ?: 'bash'
        commandLine gitBash, 'scripts/build-yffi.sh'
    } else {
        commandLine 'bash', 'scripts/build-yffi.sh'
    }

    doLast {
        println "yffi library built successfully"
    }
}

// Task to copy the native library to resources
task copyNativeLibrary(type: Copy, dependsOn: buildYffi) {
    group = 'build'
    description = 'Copies the native library to Java resources'

    def osName
    if (org.gradle.internal.os.OperatingSystem.current().isLinux()) {
        osName = 'linux'
    } else if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        osName = 'macos'
    } else if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        osName = 'windows'
    } else {
        throw new GradleException("Unsupported OS")
    }

    def osArch = System.getProperty("os.arch").toLowerCase()
    if (osArch.contains("amd64") || osArch.contains("x86_64")) {
        osArch = 'x86_64'
    } else if (osArch.contains("aarch64") || osArch.contains("arm64")) {
        osArch = 'aarch64'
    } else {
        throw new GradleException("Unsupported architecture: " + osArch)
    }

    from("${rootProject.buildDir}/native") {
        include 'libyrs.so'
        include 'libyrs.dylib'
        include 'yrs.dll'
    }
    into "${project.buildDir}/resources/main/native/${osName}/${osArch}"

    doLast {
        println "Native library copied to resources"
    }
}

// Make processResources depend on copying the native library
processResources.dependsOn copyNativeLibrary

// Publishing is configured in the root build.gradle via the vanniktech plugin.
// POM metadata comes from gradle.properties (root: shared; module: POM_ARTIFACT_ID/NAME/DESCRIPTION).
