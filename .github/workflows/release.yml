name: Release

# Triggered by module-scoped tags (<module>/<version>) pushed by
# prepare-release.yml. Parses the tag, validates the version, conditionally
# builds native libraries for ycrdt-jni / ycrdt-panama, publishes the module
# to Maven Central via the vanniktech plugin, and creates a GitHub Release.

on:
  push:
    tags:
      # GitHub tag filters only support *, **, ? — not regex. Validate the
      # concrete format in the parse-tag job below.
      - '*/*'

permissions:
  contents: write

# Serialize runs for the same tag (prevents re-pushed tags from racing Central
# staging) while letting different module tags publish in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  parse-tag:
    name: Parse tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      module: ${{ steps.parse.outputs.module }}
      version: ${{ steps.parse.outputs.version }}
      needs_native_jni: ${{ steps.parse.outputs.needs_native_jni }}
      needs_native_panama: ${{ steps.parse.outputs.needs_native_panama }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse and validate tag
        id: parse
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tag="${REF#refs/tags/}"
          module="${tag%/*}"
          version="${tag##*/}"

          publishable_modules=(
            ycrdt-core ycrdt-jni ycrdt-panama yprosemirror
            yhocuspocus yhocuspocus-websocket yhocuspocus-spring-websocket yhocuspocus-redis
            ycrdt-bom
          )
          is_publishable=false
          for m in "${publishable_modules[@]}"; do
            [ "$m" = "$module" ] && is_publishable=true && break
          done
          if [ "$is_publishable" != "true" ]; then
            echo "::error::Tag '${tag}' does not reference a publishable module; module='${module}' is not in the allowlist"
            exit 1
          fi

          # Strict semver rejects any -SNAPSHOT suffix and any non-release form
          # (e.g. 1.0.0-alpha, 1.0) in a single check.
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${version}' is not strict semver (MAJOR.MINOR.PATCH); refusing to release -SNAPSHOT or pre-release tags"
            exit 1
          fi

          # Cross-check: the tagged commit's version.properties must match the tag.
          file_version=$(awk -F= '/^version=/{print $2}' "${module}/version.properties" | tr -d '[:space:]')
          if [ "$file_version" != "$version" ]; then
            echo "::error::${module}/version.properties is '${file_version}' but tag says '${version}'"
            exit 1
          fi

          # BOM releases must not pin any -SNAPSHOT constituent.
          if [ "$module" = "ycrdt-bom" ]; then
            for m in ycrdt-core ycrdt-jni ycrdt-panama yprosemirror yhocuspocus yhocuspocus-websocket yhocuspocus-spring-websocket yhocuspocus-redis; do
              v=$(awk -F= '/^version=/{print $2}' "${m}/version.properties" | tr -d '[:space:]')
              if [[ "$v" == *-SNAPSHOT ]]; then
                echo "::error::Cannot release ycrdt-bom while ${m} is still at ${v}; release ${m} first"
                exit 1
              fi
            done
          fi

          needs_native_jni=false
          needs_native_panama=false
          [ "$module" = "ycrdt-jni" ] && needs_native_jni=true
          [ "$module" = "ycrdt-panama" ] && needs_native_panama=true

          {
            echo "module=${module}"
            echo "version=${version}"
            echo "needs_native_jni=${needs_native_jni}"
            echo "needs_native_panama=${needs_native_panama}"
          } >> "$GITHUB_OUTPUT"

          echo "Tag: ${tag}"
          echo "Module: ${module}"
          echo "Version: ${version}"
          echo "Needs JNI natives: ${needs_native_jni}"
          echo "Needs Panama natives: ${needs_native_panama}"

  build-native-jni:
    name: Build JNI native (${{ matrix.os }} - ${{ matrix.arch }})
    needs: parse-tag
    if: needs.parse-tag.outputs.needs_native_jni == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            lib_name: libycrdt_jni.so
            resource_path: native/linux/x86_64
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
            lib_name: libycrdt_jni.dylib
            resource_path: native/macos/aarch64
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            lib_name: ycrdt_jni.dll
            resource_path: native/windows/x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ycrdt-jni/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release library
        run: cd ycrdt-jni && cargo build --release --target ${{ matrix.target }}

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-jni-${{ matrix.os }}-${{ matrix.arch }}
          path: ycrdt-jni/target/${{ matrix.target }}/release/${{ matrix.lib_name }}
          retention-days: 1

  build-native-panama:
    name: Build Panama native (${{ matrix.os }} - ${{ matrix.arch }})
    needs: parse-tag
    if: needs.parse-tag.outputs.needs_native_panama == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            lib_name: libyrs.so
            resource_path: native/linux/x86_64
          - os: macos-latest
            arch: aarch64
            lib_name: libyrs.dylib
            resource_path: native/macos/aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            build/y-crdt/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-yffi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-yffi-

      - name: Build yffi native library
        run: |
          chmod +x scripts/build-yffi.sh
          bash scripts/build-yffi.sh

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-panama-${{ matrix.os }}-${{ matrix.arch }}
          path: build/native/${{ matrix.lib_name }}
          retention-days: 1

  publish:
    name: Publish to Maven Central
    needs: [parse-tag, build-native-jni, build-native-panama]
    # Run if parse-tag succeeded; native-build dependencies may be skipped
    # for pure-Java modules, which is fine.
    if: |
      always() &&
      needs.parse-tag.result == 'success' &&
      (needs.build-native-jni.result == 'success' || needs.build-native-jni.result == 'skipped') &&
      (needs.build-native-panama.result == 'success' || needs.build-native-panama.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODULE: ${{ needs.parse-tag.outputs.module }}
      VERSION: ${{ needs.parse-tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download native libraries
        if: needs.parse-tag.outputs.needs_native_jni == 'true' || needs.parse-tag.outputs.needs_native_panama == 'true'
        uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts

      - name: Stage JNI native libraries
        if: needs.parse-tag.outputs.needs_native_jni == 'true'
        run: |
          set -euo pipefail
          mkdir -p ycrdt-jni/src/main/resources/native/linux/x86_64
          mkdir -p ycrdt-jni/src/main/resources/native/macos/aarch64
          mkdir -p ycrdt-jni/src/main/resources/native/windows/x86_64
          find downloaded-artifacts -path "*native-lib-jni*" -name "*.so" -exec cp {} ycrdt-jni/src/main/resources/native/linux/x86_64/ \;
          find downloaded-artifacts -path "*native-lib-jni*" -name "*.dylib" -exec cp {} ycrdt-jni/src/main/resources/native/macos/aarch64/ \;
          find downloaded-artifacts -path "*native-lib-jni*" -name "*.dll" -exec cp {} ycrdt-jni/src/main/resources/native/windows/x86_64/ \;
          find ycrdt-jni/src/main/resources/native -type f

      - name: Stage Panama native libraries
        if: needs.parse-tag.outputs.needs_native_panama == 'true'
        run: |
          set -euo pipefail
          mkdir -p ycrdt-panama/src/main/resources/native/linux/x86_64
          mkdir -p ycrdt-panama/src/main/resources/native/macos/aarch64
          find downloaded-artifacts -path "*native-lib-panama*" -name "*.so" -exec cp {} ycrdt-panama/src/main/resources/native/linux/x86_64/ \;
          find downloaded-artifacts -path "*native-lib-panama*" -name "*.dylib" -exec cp {} ycrdt-panama/src/main/resources/native/macos/aarch64/ \;
          find ycrdt-panama/src/main/resources/native -type f

      - name: Verify module builds and tests
        run: ./gradlew ":${MODULE}:check"

      - name: Publish to Maven Central
        id: publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        # --no-configuration-cache: the vanniktech publish tasks are not yet
        # configuration-cache compatible as of plugin 0.36.0. Revisit when the
        # plugin drops that restriction.
        run: ./gradlew ":${MODULE}:publishAndReleaseToMavenCentral" --no-configuration-cache

      - name: Extract release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          : > "$notes_file"
          {
            echo "**${TAG}** has been published to Maven Central."
            echo ""
            echo "Coordinates: \`net.carcdr:${MODULE}:${VERSION}\`"
            echo ""
          } > "$notes_file"

          # Append the most recent dated CHANGELOG section (if any) so the
          # GitHub Release carries the curated Keep-a-Changelog body.
          extracted="$RUNNER_TEMP/changelog-section.md"
          : > "$extracted"
          if [ -f CHANGELOG.md ]; then
            awk '
              /^## [0-9]{4}-[0-9]{2}-[0-9]{2}/ && !started { started = 1; print; next }
              started && /^## / { exit }
              started { print }
            ' CHANGELOG.md > "$extracted"
          fi

          if [ -s "$extracted" ]; then
            cat "$extracted" >> "$notes_file"
          else
            echo "::warning::No dated CHANGELOG section found; release notes will contain only the coordinates. Was CHANGELOG.md updated for this release?"
            echo "_No CHANGELOG entry found for this release._" >> "$notes_file"
          fi

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --verify-tag

      # Recovery path: if the Central publish succeeded but the GitHub Release
      # create call failed (e.g. transient API hiccup), surface the exact
      # recovery command and preserve the notes file as an artifact so the
      # operator can finalize the release from a local checkout.
      - name: Upload release notes (on gh release create failure)
        if: failure() && steps.publish.conclusion == 'success' && steps.create-release.conclusion == 'failure'
        uses: actions/upload-artifact@v6
        with:
          # Artifact names cannot contain '/', which tag names do — use a safe form.
          # `overwrite: true` lets a re-dispatched run replace a stale artifact
          # from a prior attempt (concurrency serializes same-tag runs, but
          # dispatches can retry sequentially).
          name: release-notes-${{ needs.parse-tag.outputs.module }}-${{ needs.parse-tag.outputs.version }}
          path: ${{ steps.notes.outputs.notes_file }}
          retention-days: 30
          overwrite: true

      - name: Recovery instructions (on gh release create failure)
        if: failure() && steps.publish.conclusion == 'success' && steps.create-release.conclusion == 'failure'
        env:
          TAG: ${{ github.ref_name }}
          ARTIFACT: release-notes-${{ needs.parse-tag.outputs.module }}-${{ needs.parse-tag.outputs.version }}
          COORDS: net.carcdr:${{ needs.parse-tag.outputs.module }}:${{ needs.parse-tag.outputs.version }}
        run: |
          set -euo pipefail
          echo "::error::gh release create failed after the artifact was published to Maven Central. The artifact is live; finalize the GitHub Release manually using the instructions in this workflow's summary."
          {
            echo ""
            echo "### Manual GitHub Release recovery required"
            echo ""
            echo "The artifact \`${COORDS}\` was successfully published to Maven Central, but creating the GitHub Release failed."
            echo ""
            echo "1. Download the \`${ARTIFACT}\` artifact from this run and extract it. The extracted file is \`release-notes.md\`."
            echo "2. From a local checkout, check out the tag and run \`gh release create\`:"
            echo ""
            echo "   \`\`\`bash"
            echo "   git fetch --tags"
            echo "   git checkout \"${TAG}\""
            echo "   gh release create \"${TAG}\" \\"
            echo "       --title \"${TAG}\" \\"
            echo "       --notes-file release-notes.md \\"
            echo "       --verify-tag"
            echo "   \`\`\`"
            echo ""
            echo "The tag is already pushed, so the command above only creates the GitHub Release entry."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: success()
        run: |
          {
            echo "### Release published"
            echo ""
            echo "- Coordinates: \`net.carcdr:${MODULE}:${VERSION}\`"
            echo "- Tag: [${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})"
            echo "- Maven Central propagation can take up to ~30 minutes."
          } >> "$GITHUB_STEP_SUMMARY"
