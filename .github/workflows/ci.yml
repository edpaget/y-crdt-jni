name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded PR runs; keep push-to-main runs to completion so
# downstream publish workflows aren't truncated mid-matrix.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Test Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rust-src-dir: ycrdt-jni

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ycrdt-jni/target/
          key: ${{ runner.os }}-cargo-test-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-rust-

      - name: Run Rust tests
        run: cd ycrdt-jni && cargo test --verbose

      - name: Build Rust library (release)
        run: cd ycrdt-jni && cargo build --release --verbose

  test-java:
    name: Test Java (${{ matrix.os }}, Java ${{ matrix.java }}, ${{ matrix.binding }})
    runs-on: ${{ matrix.os }}
    needs: test-rust
    strategy:
      fail-fast: false
      # Coverage intent:
      # - All three OSes run Java 22 + JNI — these are also the phase-4
      #   native-artifact producer cells for build-jar.
      # - Ubuntu carries the full Java × binding sub-matrix so
      #   Java-version-specific and Panama-specific regressions surface
      #   on the cheapest runner.
      # - macOS adds Panama at Java 22 to exercise FFM on Darwin.
      # - Windows stays JNI-only to match build-native.yml (no Panama
      #   on Windows target).
      matrix:
        include:
          - os: ubuntu-latest
            java: '21'
            binding: jni
          - os: ubuntu-latest
            java: '22'
            binding: jni
          - os: ubuntu-latest
            java: '22'
            binding: panama
          - os: ubuntu-latest
            java: '24'
            binding: jni
          - os: ubuntu-latest
            java: '24'
            binding: panama
          - os: macos-latest
            java: '22'
            binding: jni
          - os: macos-latest
            java: '22'
            binding: panama
          - os: windows-latest
            java: '22'
            binding: jni

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ycrdt-jni/target/
            build/y-crdt/
          key: ${{ runner.os }}-cargo-${{ matrix.binding }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.binding }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for scripts
        if: runner.os != 'Windows'
        run: chmod +x gradlew scripts/build-yffi.sh

      - name: Build yffi native library (Panama only)
        if: matrix.binding == 'panama'
        run: bash scripts/build-yffi.sh

      - name: Build and test with JNI binding
        if: matrix.binding == 'jni'
        run: ./gradlew build --info -PskipPanama=true

      - name: Build and test with Panama binding
        if: matrix.binding == 'panama'
        run: |
          ./gradlew :ycrdt-panama:build --info
          ./gradlew :yprosemirror:test :yhocuspocus:test :yhocuspocus-websocket:test :yhocuspocus-spring-websocket:test -PtestBinding=panama --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.binding }}-${{ matrix.os }}-java${{ matrix.java }}
          path: |
            **/build/reports/tests/
            **/build/test-results/

      # Hand off the release native lib to build-jar for exactly one cell per
      # OS so we don't recompile it in a separate build-native-libraries cell.
      # Java 22 + binding=jni matches the version build-jar / release.yml use.
      - name: Upload native library (Linux x86_64)
        if: matrix.os == 'ubuntu-latest' && matrix.java == '22' && matrix.binding == 'jni'
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-ubuntu-latest-x86_64
          path: ycrdt-jni/target/release/libycrdt_jni.so
          retention-days: 30

      - name: Upload native library (macOS aarch64)
        if: matrix.os == 'macos-latest' && matrix.java == '22' && matrix.binding == 'jni'
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-macos-latest-aarch64
          path: ycrdt-jni/target/release/libycrdt_jni.dylib
          retention-days: 30

      - name: Upload native library (Windows x86_64)
        if: matrix.os == 'windows-latest' && matrix.java == '22' && matrix.binding == 'jni'
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-windows-latest-x86_64
          path: ycrdt-jni/target/release/ycrdt_jni.dll
          retention-days: 30

  build-native-libraries:
    name: Build Native Library (Linux aarch64 cross-compile)
    runs-on: ubuntu-latest
    needs: [test-rust, test-java]
    # Native-runner targets (linux/x86_64, macos/aarch64, windows/x86_64) are
    # uploaded directly from the test-java matrix; only the cross-compiled
    # aarch64 Linux build remains here.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ycrdt-jni/target/
          key: ${{ runner.os }}-aarch64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-aarch64-unknown-linux-gnu-cargo-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --force

      - name: Build release library (cross-compiled)
        run: cd ycrdt-jni && cross build --release --target aarch64-unknown-linux-gnu

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-lib-ubuntu-latest-aarch64
          path: ycrdt-jni/target/aarch64-unknown-linux-gnu/release/libycrdt_jni.so
          retention-days: 30

  build-jar:
    name: Build JAR with Native Libraries
    runs-on: ubuntu-latest
    needs: build-native-libraries

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download all native libraries
        uses: actions/download-artifact@v8
        with:
          path: downloaded-artifacts

      - name: Organize native libraries
        run: |
          mkdir -p ycrdt-jni/src/main/resources/native/linux/x86_64
          mkdir -p ycrdt-jni/src/main/resources/native/linux/aarch64
          mkdir -p ycrdt-jni/src/main/resources/native/macos/aarch64
          mkdir -p ycrdt-jni/src/main/resources/native/windows/x86_64

          # Copy each platform's library to the correct location
          # Linux x86_64
          cp downloaded-artifacts/native-lib-ubuntu-latest-x86_64/*.so ycrdt-jni/src/main/resources/native/linux/x86_64/ || true
          # Linux aarch64
          cp downloaded-artifacts/native-lib-ubuntu-latest-aarch64/*.so ycrdt-jni/src/main/resources/native/linux/aarch64/ || true
          # macOS aarch64
          cp downloaded-artifacts/native-lib-macos-latest-aarch64/*.dylib ycrdt-jni/src/main/resources/native/macos/aarch64/ || true
          # Windows x86_64
          cp downloaded-artifacts/native-lib-windows-latest-x86_64/*.dll ycrdt-jni/src/main/resources/native/windows/x86_64/ || true

          # List what we copied
          echo "=== Organized native libraries ==="
          find ycrdt-jni/src/main/resources/native -type f

      - name: Build JAR with Gradle
        run: ./gradlew :ycrdt-jni:jar --info

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: ycrdt-jni-jar
          path: ycrdt-jni/build/libs/*.jar
          retention-days: 90

      - name: List JAR contents
        run: |
          echo "JAR contents:"
          jar tf ycrdt-jni/build/libs/*.jar | grep -E "\.so|\.dylib|\.dll" || echo "No native libraries found in JAR"

  check-jar:
    name: Verify JAR Package
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v8
        with:
          name: ycrdt-jni-jar

      - name: Verify JAR structure
        run: |
          echo "=== JAR Structure ==="
          jar tf *.jar

          echo ""
          echo "=== Native Libraries ==="
          jar tf *.jar | grep -E "native.*\.(so|dylib|dll)" || (echo "ERROR: No native libraries found!" && exit 1)

          echo ""
          echo "=== Java Classes ==="
          jar tf *.jar | grep -E "\.class$" || (echo "ERROR: No Java classes found!" && exit 1)

          echo ""
          echo "JAR verification passed!"
